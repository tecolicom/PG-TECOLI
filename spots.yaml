  title: 中東京変電所（埼玉県日高市）
  subtitle: 3つの“電力の世界”が交わる場所
  marker: [139.35386, 35.91528]      # 吹き出しの位置
  camera:                             # クリック時に飛ぶカメラ
    center: [139.363, 35.9225]
    zoom: 12.7
    pitch: 57
    bearing: -35
  select_bbox: [139.335, 35.898, 139.395, 35.945]  # この範囲の路線を全選択（西・南・東・北）
  more: https://pg.tecoli.com/spots.html
  body: |
    日高市の住宅地の縁にある**中東京変電所**。一見ふつうの変電所ですが、
    送電線を電圧色でたどると、性格のまったく違う3つの系統がここで出会っていることが分かります。

    **① 鉄道の電力 — JR東日本の自営送電線（茶・154kV）**

    北から変電所に入る茶色の「**中東京信濃川線**」は、JR東日本が自前で持つ送電線の分岐です。
    源流は約200km先、新潟県の信濃川に鉄道省が建設した**信濃川発電所**
    （千手発電所: 昭和6年着工・昭和14年運転開始。のち小千谷〔昭和26年〕・小千谷第二〔平成2年〕が加わり、
    国鉄を経て JR東日本が継承）。発電した電力は 154kV の自営送電線で三国山脈の清水峠を越えて
    東京・武蔵境まで送られ、JR東日本の消費電力の約4分の1をまかなっています。
    その幹線からの分岐がここで一般の送電網と連系している — つまりこの変電所は
    **鉄道電力と一般電力網の接点**です。

    **② 首都圏の大動脈 — 500kV 基幹系統（紫）**

    すぐ北を横切る紫の**西上武幹線**は、群馬・埼玉西部を貫く 500kV の基幹送電線。
    東隣の鶴ヶ島には 500kV の**新所沢変電所**が構え、赤い**中沢線3・4号線**（275kV）が
    両者の間を結びます。戦後に築かれた首都圏西部の電力大動脈です。

    **③ 工場への専用線 — 太平洋セメント（黄・66kV）**

    南西へ目を移すと、黄色い 66kV の線が**太平洋セメント埼玉工場の専用変電所**へ一直線に
    延びています。セメント製造は電力多消費型産業の代表格。工場のためだけに引かれた
    専用フィーダーが、地図にそのまま姿を現しています。

    戦前の鉄道自営電力、戦後の 500kV 基幹系統、産業への専用供給 —
    **時代も役割も違う3つの送電網が、数kmの範囲に同居している**のがこの場所の面白さです。

    参考: [信濃川発電所 — Wikipedia](https://ja.wikipedia.org/wiki/信濃川発電所) ／
    [JR東日本「自営電力の概要」(PDF)](https://www.jreast.co.jp/epd/pdf/epd-pamphlet.pdf) ／
    [JR東日本 架空送電線 経路一覧](https://henndennkidenntushinnmoromoro.blogspot.com/2018/11/844jr.html)
