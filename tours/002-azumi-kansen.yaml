published: true
issue: 4
title: 安曇幹線 — えぼし型鉄塔、山なみを越えて
subtitle: 新信濃変電所から新秩父開閉所へ、信州の揚水電力を運ぶ500kV×2ルート
summary: >-
  梓川・高瀬川の揚水発電群と首都圏を結ぶ500kV・安曇幹線を、新信濃変電所から
  新秩父開閉所まで約113kmたどる路線ツアー第2弾。国内唯一の1回線水平配列×2ルート、
  えぼし型鉄塔の列が標高1,600mの山なみを越えていきます。
routes:
  - 安曇幹線１号線
  - 安曇幹線２号線
stops:
  - heading: 新信濃変電所（長野県朝日村）
    camera: {center: [137.884, 36.139], zoom: 13, pitch: 55, bearing: 60}
    body: |
      旅の起点は松本盆地の南西のへり、朝日村の**新信濃変電所**です。
      50Hzと60Hzの境目に立つ**周波数変換所**を併設し、1977年と1992年に30万kWずつ、
      計60万kWの変換能力で東西の電力融通を担ってきました
      （2021年には飛騨と結ぶ直流連系設備も加わっています）。
      面白いのは、安曇幹線がこの変電所より年上だということ。1969年に開通した線が先にここを通り、
      8年後の1977年に変電所が完成して、あらためて起点になりました。
      梓川・高瀬川の発電所群から届いた電力はここで50万ボルトに昇圧され、東へ —
      約113kmの山越えが始まります。
  - heading: 梓川と高瀬川 — 「水の蓄電池」の送り出し口
    camera: {center: [137.80, 36.14], zoom: 10.8, pitch: 55, bearing: 270}
    body: |
      この線が生まれた理由は、西の山の中にあります。1969年、梓川に**安曇発電所**（62.3万kW）と
      **水殿発電所**（24.5万kW）が誕生。ダムを上池と下池に使い、昼は水を落として発電し、
      夜は余った電力で水をくみ上げる**揚水発電所**です。安曇幹線の第1ルートは、
      この電力を関東へ運ぶため同じ1969年に運用を開始しました。1979年には高瀬川の地下に
      **新高瀬川発電所**（128万kW）が加わり、3か所あわせて**昼間最大210万kW**。
      夜はこの線を逆向きに電気が流れ、明日の発電用水を山の上へ戻します。
      ちなみに、梓川の電気を関東へ送るのは大正以来の伝統 — 1923年には竜島発電所から
      横浜方面へ、日本初の154kV送電線「京浜線」（約200km）が動き出していました。
  - heading: えぼし型鉄塔 — 横一列の理由
    camera: {center: [138.03, 36.09], zoom: 11.5, pitch: 55, bearing: 60}
    body: |
      塩尻峠のあたりから、線は本格的な山越えにかかります。ここで、この旅の主役
      **えぼし型（烏帽子型）鉄塔**をじっくり眺めましょう。日本の送電鉄塔で一般的なのは、
      上下3段の腕に電線を振り分けて左右に2回線を載せる形。対して安曇幹線は、
      **1回線ぶん3本の電線を横一列に並べる「水平配列」**で、烏帽子をかぶったような
      シルエットからこの名が付きました。

      なぜこの形が必要なのか。鍵は**着氷雪**です。経路は最高約1,600m・平均約860mの
      高標高地帯。湿った雪が電線に筒状に付き、それが一斉に脱落すると、荷を下ろした電線は
      反動で大きく跳ね上がります（**スリートジャンプ**）。氷で断面が翼形になった電線が
      風を受けてゆっくり大きく波打つ**ギャロッピング**も起きます。電線を上下に積む
      一般的な配列では、跳ね上がった下の相が上の相に接近して**相間短絡** — 基幹500kVの
      送電停止 — につながりかねません。対策の基本は、電線の真上に電線を置かないこと。
      上下配列では腕の長さを段ごとに変える**オフセット**で電線をずらしますが、
      えぼし型の水平配列は**そもそも電線を上下に重ねない**ことで、この課題を構造から
      解消した耐氷雪形です。3本の電線がどれだけ跳ねても相間の距離は保たれ、
      鉄塔の背が低いぶん、稜線で受ける風や着氷の荷重も抑えられると考えられます。

      雪が送電を襲うのは、机上の話ではありません。着氷雪は電線の張力を通常の数倍にも
      引き上げ、短絡どころか**鉄塔そのものを倒す**ことがあります。1986年3月の関東の大雪では、
      強風と着雪で**神奈川県内の送電鉄塔6基が倒壊**し、最長50時間を超える停電が約300万人に
      影響しました。1998年のカナダ・ケベックを襲った氷嵐では、**鉄塔約130基**と3万本超の
      電柱が倒れ、400万人以上が真冬に電気を失っています。基幹送電線の耐氷雪設計は、
      こうした教訓の上にあります。

      代償は土地です。1基に1回線しか載らないため、2回線を送るには**ルートごと2本**
      建てるしかなく、鉄塔の基数も用地もほぼ2倍。土地の限られた日本で標準になれなかったのは
      このためです。それでも「豪雪の峠で基幹系統を止めない」という一点でこの費用のかかる
      形式が選ばれ、**起点から終点まで1回線水平配列×2ルートで貫く500kV送電線は、
      国内でこの安曇幹線だけ**になりました。ちなみにえぼし型、2本の「耳」が猫に見えることから
      ファンには「**ネコ鉄塔**」と呼ばれる人気者で、送配電事業者の配る鉄塔カードや
      カプセルトイのミニチュア、ペーパークラフトの題材にもなっています。新しく建つことは
      まれな形式 — 現役の列をこれだけ長く追える安曇幹線は、それだけで貴重です。
  - heading: 和田峠・長和町 — 高所の稜線と、入れ替わる2本
    camera: {center: [138.17, 36.14], zoom: 11.3, pitch: 55, bearing: 60}
    body: |
      中山道の難所として知られる和田峠の一帯は、経路でも指折りの高所です。
      山岳の長い径間では鉄塔から鉄塔まで750mを超える箇所もあり、強度の高い電線が使われています。
      そしてここ長和町では、面白いことが起きています。1981年に南側の第2ルートを建設した際、
      町内の約9kmだけは**既設の線を第2ルートに譲り、第1ルート用の線を北側に新しく建てた**のです。
      地図では同じ顔をして並ぶ2本の線も、区間によって新旧が入れ替わっている —
      送電線の歴史は、こういう細部に隠れています。
  - heading: 佐久から県境の山へ — つかず離れずの2ルート
    camera: {center: [138.55, 36.11], zoom: 10.5, pitch: 55, bearing: 70}
    body: |
      高原を下って佐久へ。このあたりでは、2本の線が5〜6kmも離れて走る区間があります。
      基本は寄り添って並走する計画でしたが、地形や土地の事情で離れざるを得なかった場所です。
      1回線ずつ別ルートに分かれているおかげで、片方に何かあっても、
      もう片方で送り続けられる安心にもつながる形です。
      線はやがて佐久穂から相木の谷へ入り、ぶどう峠・十石峠のあたりで群馬県上野村へ。
      神流川の源流域を抜け、両神山の北側の山なみを縫って、埼玉へと入っていきます。
  - heading: 新秩父開閉所（埼玉県小鹿野町） — 15年がかりの終幕
    camera: {center: [138.937, 36.031], zoom: 13, pitch: 55, bearing: 0}
    body: |
      秩父の山あい、小鹿野町の**新秩父開閉所**がこの旅の終点です。
      実は、1969年開通時の第1ルートはここを素通りして、安曇発電所から**新所沢**（鶴ヶ島市）まで
      168kmを一気に走っていました。1982年、第2ルートに続いて第1ルートも
      この開閉所へ引き込まれて50万ボルトに昇圧され、1967年の着工から**15年がかりの大工事**が完結。
      切り離された新秩父〜新所沢間の約37kmは遊休設備になりました。
      信州から届いた電力はここで**新秩父線**・**新岡部線**・**新榛名線**に振り分けられ、
      500kV外輪系統へ注がれます。環のしくみは見どころ
      [新秩父開閉所と500kV外輪系統](https://pg.tecoli.com/?spot=shin-chichibu-500kv)で。
      そして安曇幹線が最初に目指したゴール・新所沢変電所へは、ツアー第1弾
      [新所沢線 — 外輪系統・西の弧をゆく](https://pg.tecoli.com/tour/shin-tokorozawa)
      で旅の続きをどうぞ。
