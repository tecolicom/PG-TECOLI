title: 新所沢線 — 外輪系統・西の弧をゆく
subtitle: 新多摩変電所から新所沢変電所へ、関東平野の縁を北上する500kV
summary: >-
  首都圏を取り囲む500kV外輪系統の西の弧・新所沢線をたどる路線ツアー。
  八王子の新多摩変電所から秋川・多摩川・入間川・高麗川と谷を越え、
  関東平野の縁を北上して鶴ヶ島の新所沢変電所へ。全長約35kmを6つの停車地で巡ります。
routes:
  - 新所沢線
stops:
  - heading: 新多摩変電所（東京都八王子市）
    camera: {center: [139.223, 35.715], zoom: 13, pitch: 55, bearing: 30}
    body: |
      旅の起点は、八王子市の北のはずれ、上川町の山あいに広がる**新多摩変電所**です。
      2000年に臨海部の地下へ新豊洲変電所ができるまで、東京都内の500kV変電所は
      ここだけだったといわれます。地図で紫の線をたどると、南の新秦野変電所からの**新多摩線**、
      西の新秩父開閉所からの**新秩父線**、そして北へ向かう**新所沢線** —
      3本の500kV路線がこの山あいの一点に集まっているのが分かります。
      都心を遠巻きに取り囲む500kV外輪系統の南西の結節点。
      ここから外輪の「西の弧」を、北へたどっていきましょう。
  - heading: 秋川、そして多摩川を越えて
    camera: {center: [139.200, 35.768], zoom: 12.2, pitch: 55, bearing: 0}
    body: |
      変電所を出た新所沢線は、市街地には目もくれず、関東平野と山地の境目を選んで北上します。
      まず五日市の市街の西で**秋川**の谷を渡り、尾根を越えて、
      青梅市ではJR青梅線・軍畑駅にほど近いあたりで**多摩川**の谷をまたぎます。
      地図で測ると、鉄塔の間隔は長いところで700m近く。谷の両側の尾根に立つ鉄塔どうしを、
      電線が一足飛びに結んでいるのです。2回線・4導体という500kVらしい重装備の線が、
      ハイキングで親しまれる奥多摩の入口の山々を静かに越えていきます。
  - heading: 成木・名栗 — 山ぎわの道
    camera: {center: [139.222, 35.845], zoom: 12.2, pitch: 55, bearing: 20}
    body: |
      多摩川を渡った鉄塔の列は、青梅市北部・成木の山地を進みます。この区間の鉄塔は
      高さ約90m。都県境の尾根・成木尾根を鞍部で越えて、埼玉県飯能市に入ります。
      ここで地図を少し引いて眺めてみてください。新所沢線がほぼ一貫して、
      市街地の広がる平野と山地の境界線をなぞるように走っているのが見えるはずです。
      巨大な鉄塔と広い用地を必要とする500kVの送電線にとって、山ぎわは格好の通り道。
      西の山中を走る新秩父線や西上武幹線といった500kVの仲間たちも、
      やはり山を選んで関東平野へ下りてきます。
  - heading: 新飯能変電所 — 500kVの珍しい途中分岐
    camera: {center: [139.236, 35.852], zoom: 13.2, pitch: 55, bearing: 0}
    body: |
      飯能市に入ってまもなく、送電線のすぐ東に**新飯能変電所**が現れます。
      地図をよく見ると、新所沢線の鉄塔からわずか数百mの短い枝線 — **新飯能線** —
      が変電所へ引き込まれています。実は、基幹系統の500kV送電線が途中で分岐する例は
      あまりありません。新所沢線はここで電力の一部を降ろし、275kVに降圧したうえで、
      **直竹線**を介して**青梅線**（青梅変電所方面）へ送り出しています。
      直竹線の運用開始は平成11年（1999年）4月。変電所もこの頃に設けられたとみられ、
      旅の両端に構える大変電所よりずっと若い、外輪の弧の途中に後から加わった中継点です。
  - heading: 高麗川を渡って日高へ
    camera: {center: [139.298, 35.893], zoom: 12.8, pitch: 55, bearing: 15}
    body: |
      変電所を過ぎた送電線は**入間川**（上流部は名栗川とも呼ばれます）の谷を渡り、
      飯能から日高市へ。山地はしだいに低くなり、やがて曼珠沙華の群生地として名高い
      **巾着田**の少し上流で**高麗川**を渡ります。起点からここまで、
      秋川・多摩川・入間川・高麗川 — 関東山地から平野へ流れ出す川を4つ越えてきました。
      谷を刻んで東へ流れる川と、尾根づたいに北へ進む送電線。
      地図の上で直角に交わるふたつの「流れ」の網目が、この区間の見どころです。
      高麗川を越えると鉄塔の列は向きを東へ変え、日高の台地を下って、
      いよいよ終点の鶴ヶ島へ向かいます。
  - heading: 新所沢変電所（埼玉県鶴ヶ島市）
    camera: {center: [139.369, 35.928], zoom: 13, pitch: 55, bearing: 0}
    body: |
      終点の**新所沢変電所**は昭和50年（1975年）の運転開始。
      当時は「東洋一の規模」とうたわれた超高圧変電所です。ここには今たどってきた新所沢線のほか、
      群馬からの**西上武幹線**、北東へ向かう**新古河線**・**新鶴ヶ島線**と500kVが四方から集まり、
      275kVに降圧されて南狭山線・南川越線・中沢線で平野部へ配られていきます。
      中沢線の「中沢」は地名ではなく、隣り合う中東京変電所の「中」と新所沢の「沢」。
      その中東京変電所は見どころ
      [中東京変電所（埼玉県日高市）](https://pg.tecoli.com/?spot=nakatokyo-hidaka)
      で紹介しています。そして今回の「西の弧」が首都圏500kV網の全体のどこにあたるのかは、見どころ
      [新秩父開閉所と500kV外輪系統](https://pg.tecoli.com/?spot=shin-chichibu-500kv)
      でどうぞ。
