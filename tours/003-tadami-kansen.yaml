title: 只見幹線 — 名前を変えながら生きる草分け
subtitle: 田子倉発電所から西東京変電所へ、雪国生まれの275kVを継ぐ線たち
summary: >-
  1959年、田子倉発電所とともに生まれた電源開発・只見幹線。豪雪の只見から尾瀬の東を抜け、
  町田の西東京変電所まで約200km — いまは区間ごとに名前を変えた「長距離送電の草分け」を、
  分割と昇圧の歴史とともにたどる路線ツアー第3弾です。
routes:
  - 只見幹線
  - 西南川越線（只見幹線）
  - 坂戸川越線（只見幹線）
  - 新坂戸線（只見幹線）
  - 電源開発 只見幹線（新赤城線）
  - 奥只見線
stops:
  - heading: 田子倉発電所（福島県只見町）
    camera: {center: [139.288, 37.314], zoom: 12.5, pitch: 55, bearing: 180}
    body: |
      旅の始まりは福島県只見町、雪深い只見川の**田子倉発電所**です。
      戦後の電力不足に応えるため国の特殊会社として設立された電源開発（J-POWER）が
      只見川で進めた大開発の中核で、1959年の完成時には**日本最大の一般水力発電所**（38万kW）でした。
      同じ1959年5月、この電力を首都圏へ運ぶために動き出したのが**只見幹線** —
      27万5千ボルトで町田の西東京変電所まで、地図上で継ぎ足すとおよそ200kmを走る、
      日本の長距離送電の草分けです。ダム湖の脇から立ち上がる鉄塔の列を、南へ追いかけましょう。
  - heading: 奥只見 — 日本屈指の豪雪地帯
    camera: {center: [139.245, 37.16], zoom: 12, pitch: 55, bearing: 200}
    body: |
      県境の山塊をひと越えすると、銀山湖のほとりに**奥只見発電所**が現れます。
      田子倉と同じ時代に電源開発が建設した水力で、資材を運ぶためだけに掘られた道路
      「奥只見シルバーライン」は全長22kmのうち約18kmがトンネルという剛毅なもの。
      この一帯が**日本屈指の豪雪地帯**であることを物語ります。のちの増設で出力は56万kWとなり、
      いまでは**一般水力で日本一**の発電所です。地図の上でも、田子倉から下ってきた線は
      ここで**奥只見線**につながり、ひと続きの帯になってさらに南へ下っていきます。
  - heading: 尾瀬の東、白根の西 — 片品を南へ
    camera: {center: [139.33, 36.88], zoom: 11, pitch: 55, bearing: 190}
    body: |
      送電線は県境を越えて群馬県片品村へ。地図を引くと、西に**尾瀬**の湿原と燧ヶ岳、
      東に**日光白根山**。赤い線は、その間の山なみを縫うように南下していきます。
      日本屈指の豪雪で知られる山岳地帯に、1950年代の技術でこれだけの鉄塔を
      建て並べたこと自体が、この路線の最大の見どころです。
      完成から半世紀以上 — 只見の電気は、今日もこの峰々を越えて関東へ下っています。
  - heading: 東群馬変電所（群馬県沼田市）— 分割と昇圧
    camera: {center: [139.224, 36.579], zoom: 12.5, pitch: 55, bearing: 180}
    body: |
      片品川の谷を下りきると、沼田市の**東群馬変電所**に着きます。
      かつて田子倉から西東京まで一本だった只見幹線は、のちに**東群馬・新坂戸・南川越の
      3つの変電所で区切られました**。1999年には、ここから新坂戸までの区間が**50万ボルトへ昇圧**。
      この先の区間が地図で紫色 — **電源開発 只見幹線（新赤城線）**、そして
      **新坂戸線（只見幹線）** — になっているのはそのためです。
      路線名のカッコ書きに残る旧名が、一本の幹線だった歴史を今に伝えています。
      線はここから赤城山の東麓を回り込み、関東平野へと下ります。
  - heading: 新坂戸変電所（埼玉県坂戸市）— 外輪の環に合流
    camera: {center: [139.437, 35.962], zoom: 12.8, pitch: 55, bearing: 180}
    body: |
      関東平野をまっすぐ南へ下ると、**新坂戸変電所**（坂戸市）で、只見幹線の後継は
      首都圏をとりまく**500kV外輪系統**の環に合流します。ここから先は再び27万5千ボルト。
      すぐ南の**南川越変電所**（電源開発）でもう一度区切られ、**坂戸川越線**・**西南川越線**と
      名前を変えながら川越の西を進みます。現地の鉄塔の表札には、いまも「只見幹線」の名が
      残っているそうです。環のしくみは見どころ
      [新秩父開閉所と500kV外輪系統](https://pg.tecoli.com/?spot=shin-chichibu-500kv)でどうぞ。
  - heading: 西東京変電所（東京都町田市）— 200kmの旅の果て
    camera: {center: [139.457, 35.605], zoom: 13, pitch: 55, bearing: 0}
    body: |
      多摩丘陵を越え、旅は町田市の**西東京変電所**に行き着きます。
      ここは電源開発の関東側の拠点で、北からこの**只見幹線**、南からは天竜川・佐久間発電所
      方面からの**佐久間東幹線**が届き、東京電力の系統と結ばれる中継点 —
      **只見と佐久間、戦後日本の二大電源開発の電気が出会う場所**です。
      南端のこの区間には、いまも「只見幹線」の名がそのまま残っています。
      遠い山の発電所から、外輪系統の環を貫いて都心のすぐそばまで一本で届く —
      1959年生まれの大先輩は、名前を区間ごとに変えながら、今日も現役です。
