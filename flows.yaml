# 地域間連系線のコリドー定義（潮流ライブ表示用）
# - occto: OCCTO 広域予備率Web公表システムの「連系線名」と一致させるキー
# - from → to が OCCTO の「順方向」。潮流値が負のときは表示側で向きを反転する
# - 座標は模式的な代表点 [経度, 緯度]（正確な経過地ではなく、流れの向きを示すための線）
# - フェンス系（中部・北陸・関西フェンス）は境界の合算値で1本の線ではないため対象外
- occto: 北海道・本州間電力連系設備
  label: 北本連系
  from: [140.70, 41.78]     # 北海道・函館方面
  to: [141.28, 40.88]       # 青森・上北方面
- occto: 相馬双葉幹線
  label: 相馬双葉幹線
  from: [140.98, 37.83]     # 東北・相馬
  to: [141.00, 37.28]       # 東京・双葉
- occto: 周波数変換設備
  label: 周波数変換設備(FC計)
  from: [138.85, 35.95]     # 東京側（模式）
  to: [137.55, 35.55]       # 中部側（模式。新信濃・佐久間・東清水の合算）
- occto: 関西-中国（東）
  label: 関西-中国(東)
  from: [134.85, 34.95]     # 関西側
  to: [133.95, 34.90]       # 中国側
- occto: 関西-中国（西）
  label: 関西-中国(西)
  from: [134.70, 34.55]
  to: [133.85, 34.45]
- occto: 阿南紀北直流幹線
  label: 阿南紀北直流幹線
  from: [135.30, 34.28]     # 関西・紀北
  to: [134.63, 33.92]       # 四国・阿南
- occto: 本四連系線
  label: 本四連系線
  from: [133.80, 34.58]     # 中国・倉敷
  to: [133.86, 34.31]       # 四国・坂出
- occto: 関門連系線
  label: 関門連系線
  from: [131.03, 34.05]     # 中国・下関
  to: [130.85, 33.88]       # 九州・北九州
