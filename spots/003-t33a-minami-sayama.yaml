id: t33a-minami-sayama
title: 南狭山線と入間川墜落事故（埼玉県狭山市）
subtitle: 一本の送電線が、80万軒の灯を支えていた
marker: [139.4108, 35.8769]         # 墜落地点付近（狭山市柏原・入間川左岸）
camera:                              # 南狭山線の全線（新所沢変電所〜南狭山変電所）が入る俯瞰
  center: [139.407, 35.883]
  zoom: 12.3
  pitch: 55
